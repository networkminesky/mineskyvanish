# MineskyVanish v1.0.0 - Mensagens
#
# Informações:
# <..> significa que .. é obrigatório; [..] significa que .. é opcional e pode ser omitido; | dentro de [] ou <> significa 'OU'
# Você pode usar o caractere & para códigos de cores; Exemplo: '&cA cor deste texto seria vermelha!'
# Você pode usar #XXXXXX para códigos de cores HEX. Exemplo: '#663EF6Este texto seria roxo!'
# Você pode usar %p% para obter o nome do jogador; Exemplo: '&4&l%p%, você não tem permissão para executar este comando!'
# Você pode usar %other% para obter o nome do alvo ou da causa
# Você pode usar %d% para obter o nome de exibição do jogador; se você usar o Essentials, o nome de exibição também conterá o prefixo
# Você pode usar %tab% para obter o nome do jogador na lista de jogadores (TAB)
# Você pode usar %prefix% para obter o prefixo do jogador (Requer Vault)
# Você pode usar %suffix% para obter o sufixo do jogador (Requer Vault)
# Você pode usar %group% to para obter o grupo do jogador (Requer Vault)
# Você pode usar %nick% para obter o apelido do jogador (Requer Essentials)
# Algumas mensagens também permitem variáveis diferentes e exclusivas
#
# NOTA: Você pode obter MUITO mais placeholders instalando o PlaceholderAPI ou MVdWPlaceholderAPI
#
# Mensagens vazias não serão enviadas
# Usar \n inicia uma nova linha
#
# Importante:
# Você deve dobrar as aspas simples se quiser usá-las dentro de uma mensagem (ex: '').
# Você NÃO DEVE usar nenhum caractere de tabulação (tecla tab) dentro deste arquivo, caso contrário o YAML encherá seu console de erros!
# !! Se houver erros no console após editar este arquivo, cole-o em um analisador YAML online para ver se
# há algum erro de sintaxe YAML !!
